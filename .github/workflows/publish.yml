name: Publish npm package

on:
    workflow_dispatch:
    push:
        tags:
            - "v*"

env:
    NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

permissions:
    contents: read
    id-token: write

jobs:
    publish:
        environment: production
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v1
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  registry-url: https://registry.npmjs.org

            - name: Update env-manager with production variables
              run: |
                  curl -X POST \
                      "https://env.wpsadi.dev/api/wpsadi/relayX/.env.sdk-js" \
                      -H "Authorization: Bearer ${{ secrets.ENV_MANAGER_KEY }}" \
                      -H "Content-Type: application/json" \
                      -d '{
                      "data": {
                      "NPM_TOKEN": "${{ secrets.NPM_TOKEN }}"
                      }
                      }'

            - name: Typecheck
              run: bun run typecheck

            - name: Build package
              run: bun run build

            - name: Publish to npm
              run: npm publish --access public --provenance